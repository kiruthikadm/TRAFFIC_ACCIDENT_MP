<!DOCTYPE html>
<html>
<head>
    <title>Traffic Hotspot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg">

<div class="container">

<h1>🚦 Traffic Accident Hotspot Detection</h1>

<div class="card-container">

    <div class="card" onclick="goToExisting()">
        <h2>📊 View Existing Dataset</h2>
    </div>

    <div class="card" onclick="triggerUpload()">
        <h2>📂 Upload New Dataset</h2>
    </div>

</div>

<!-- Hidden upload -->
<form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" id="fileInput" name="file" style="display:none" onchange="autoSubmit()">
</form>

{% if uploaded %}
<div class="upload-status">
    <p>✅ Uploaded: <b>{{ filename }}</b></p>
    <a href="/generate" class="btn">Generate Map</a>
</div>
{% endif %}

</div>

<script>
function goToExisting() {
    window.location.href = "/existing";
}

function triggerUpload() {
    document.getElementById("fileInput").click();
}

function autoSubmit() {
    document.getElementById("uploadForm").submit();
}
</script>

</body>
</html>
